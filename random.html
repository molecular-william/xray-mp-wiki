---
layout: default
permalink: /random/
---

<div class="random-page">
  <h1>Random Page</h1>
  <p>Loading random page...</p>
</div>

<script>
const pages = [
{% for page in site.pages %}
  "{{ page.url }}",
{% endfor %}
];
window.location = pages[Math.floor(Math.random() * pages.length)];
</script>
