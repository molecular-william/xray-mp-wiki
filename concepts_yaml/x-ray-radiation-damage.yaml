details: X-ray radiation damage is a major limitation in macromolecular crystallography.
  It causes structural changes including breakage of disulfide bonds, decarboxylation
  of acidic residues, and overall crystal deterioration. Cryocooling and dose management
  are essential mitigation strategies.
