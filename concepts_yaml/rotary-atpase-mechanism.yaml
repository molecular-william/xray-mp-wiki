details: 'Rotary ATPases (F-type, V-type, A-type) use a rotary catalytic mechanism to synthesize or hydrolyze ATP. The rotation is driven by proton or ion gradients across membranes. The mechanism involves conformational changes in the catalytic subunits that drive ATP synthesis or hydrolysis. The 1994 crystal structure of bovine F1-ATPase at 2.8 A resolution provided the first direct structural evidence for this mechanism, showing the three catalytic beta-subunits in different conformations and proposing rotation of the alpha3beta3 subassembly around the central gamma-subunit helix.'
