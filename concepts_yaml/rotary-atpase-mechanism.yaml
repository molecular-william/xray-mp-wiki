cross_refs_text: '- [V1-ATPase T. thermophilus](/xray-mp-wiki/proteins/pumps-atpases/v1-atpase-t-thermophilus/)
  — Rotary ATPase with detailed structural mechanism\n- [Bovine Mitochondrial F1-ATPase](/xray-mp-wiki/proteins/pumps-atpases/bovine-f1-atpase/)
  — First high-resolution structure supporting rotational catalysis in F-type ATPases\n-
  [Bovine F1-ATPase-Efrapeptin Complex](/xray-mp-wiki/proteins/pumps-atpases/bovine-f1-atpase-efrapeptin-complex/)
  — Inhibitor binding to beta-E blocks gamma-subunit rotation, providing structural
  evidence for the rotary mechanism\n- [Spinach Chloroplast c14 Rotor Ring](/xray-mp-wiki/proteins/pumps-atpases/spinach-chloroplast-c14-rotor-ring/)
  — First structure of an isolated c-ring rotor from a proton-driven ATPase, revealing
