details: Rotary ATPases (F-type, V-type, A-type) use a rotary catalytic mechanism
  to synthesize or hydrolyze ATP. The rotation is driven by proton or ion gradients
  across membranes. The mechanism involves conformational changes in the catalytic
  subunits that drive ATP synthesis or hydrolysis. The 1994 crystal structure of bovine
  F1-ATPase at 2.8 A resolution provided the first direct structural evidence for
  this mechanism, showing the three catalytic beta-subunits in different conformations
  and proposing rotation of the alpha3beta3 subassembly around the central gamma-subunit
  helix. The 1996 structure of F1-ATPase with efrapeptin showed that inhibitor binding
  to the beta-E subunit blocks the rotary cycle by preventing beta-E from adopting
  a nucleotide-binding conformation. The 1999 structure of the yeast F1c10 subcomplex
  at 3.9 A (Stock, Leslie, Walker) revealed that the c-ring rotor contains 10 subunits,
  establishing the symmetry mismatch between the 3-fold F1 head and 10-fold c-ring
  that is essential for smooth rotation. Subsequent structures of c-ring rotors from
  various organisms, including the spinach chloroplast c14 ring at 3.8 A (2009), revealed
  that the distance between conserved carboxylates involved in ion transport is 10.6-10.8
  A regardless of c-ring stoichiometry, suggesting a conserved gear distance in all
  rotary ATPases.
overview: Rotary ATPases (F-type, V-type, A-type) use a rotary catalytic mechanism
  to synthesize or hydrolyze ATP. The rotation is driven by proton or ion gradients
  across membranes. The mechanism involves conformational changes in the catalytic
  subunits that drive ATP synthesis or hydrolysis. The 1994 crystal structure of bovine
  F1-ATPase at 2.8 A resolution provided the first direct structural evidence for
  this mechanism, showing the three catalytic beta-subunits in different conformations
  and proposing rotation of the alpha3beta3 subassembly around the central gamma-subunit
  helix.
examples:
- protein: '[Bovine F1-ATPase-Efrapeptin Complex](/xray-mp-wiki/proteins/pumps-atpases/bovine-f1-atpase-efrapeptin-complex/)'
  context: Efrapeptin traps the empty beta-E subunit in the central cavity, preventing
    the conformational changes required for gamma-subunit rotation and supporting
    the rotary mechanism
- protein: '[Spinach Chloroplast c14 Rotor Ring](/xray-mp-wiki/proteins/pumps-atpases/spinach-chloroplast-c14-rotor-ring/)'
  context: Crystal structure of the c14 ring from proton-driven ATP synthase reveals
    14-fold symmetry and conserved 10.6-10.8 A spacing of proton-binding carboxylates,
    supporting the universal gear mechanism in rotary ATPases
