title: "Rotary ATPase Mechanism and Asymmetry"
tags: [rotary-motor, torque-generation, conformational-change, v-atpase, f-atpase, a-atpase]
sources: [doi/10.1016##j.jmb.2013.04.022]
overview: >
  The rotary ATPase mechanism involves conversion between chemical energy of ATP and ion
  gradients through a rotary catalytic mechanism. V-type, F-type, and A-type ATPases share
  a similar architecture with two rotational motors (A1/F1/V1 extrinsic motor and Ao/Fo/Vo
  membrane motor) connected by central and peripheral stalks. The mechanism relies on
  asymmetry at intersubunit interfaces, with conformational changes in catalytic subunits
  coupled to rotation. In V1-ATPase from Thermus thermophilus, asymmetry is realized by
  rigid-body rearrangements of A and B subunits rather than large interdomain movements,
  contrasting with F1-ATPase behavior.
