title: ER Retrieval Mechanism (KDEL System)
type: concept
tags: [concept-membrane-transport, concept-cell-biology, er-retrieval]
sources: [doi/10.7554##eLife.68380]
overview: >
  The ER retrieval system maintains the luminal composition of the endoplasmic
  reticulum by capturing escaped ER resident proteins from the Golgi apparatus.
  The archetypal system uses a seven-transmembrane KDEL receptor that recognizes
  C-terminal KDEL, HDEL, or RDEL retrieval signals on escaped cargo proteins.
  The receptor cycles between the ER and Golgi in a pH-dependent manner: at
  acidic pH in the Golgi, it captures retrieval signals and exposes a COPI
  binding motif for retrograde transport; at neutral pH in the ER, signal
  release triggers a conformational change that buries the COPI motif and
  exposes a COPII-binding ER exit signal for forward transport back to the
  Golgi.
category: protein-sorting
