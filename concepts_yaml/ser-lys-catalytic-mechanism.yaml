details: The ser-lys catalytic mechanism is found in rhomboid proteases and signal
  peptide peptidases. A serine residue acts as the nucleophile while a lysine residue
  serves as a general base. In rhomboid proteases, both residues are contained within
  a single domain. In signal peptide peptidases like SppA, the catalytic dyad is formed
  at the interface of tandemly repeated domains, with the serine nucleophile from
  the C-terminal half and lysine general base from the N-terminal half coming into
  proximity only when the tandem repeat folds together. This mechanism allows proteolysis
  within hydrophobic membrane environments.
