title: CorA Mg2+ Transporter
type: concept
tags: [transporter, metal-transport, pentamer]
sources: [doi/10.1002##pro.215]
overview: >
  CorA is a magnesium transporter found in most prokaryotes and some eukaryotes,
  responsible for Mg2+ uptake across membranes. CorA proteins form homopentamers
  with a distinctive funnel-shaped intracellular assembly. The family is characterized
  by the signature motif YGMNFxxMPEL in the transmembrane domain. CorA structures
  have been pivotal in understanding metal ion transport mechanisms and pentameric
  assembly in membrane proteins.
category: transporter-family
related-family: "Metal Ion Transporter (MIT) superfamily"
signature-motif: "YGMNFxxMPEL (CorA subgroup A)"
structure:
  oligomeric_state: homopentamer
  subunits_per_monomer: 2 transmembrane alpha-helical spanners
  intracellular_domain: funnel-shaped assembly
  key_structures:
    - pdb: "2QDS (Tm-CorA, 2.9 A)"
      source: Nature 440:833-837
    - pdb: "2HSL (Tm-CorA, 3.7 A)"
      source: Nature 440:833-837
    - pdb: "2HSM (Tm-CorA, 3.9 A)"
      source: Nature 440:833-837
    - pdb: "2GKQ (Af-CorA, 2.9 A)"
      source: Science 313:354-357
    - pdb: "2GKR (Af-CorA, 2.9 A)"
      source: EMBO J 25:3762-3773
biological_function:
  substrate: "Mg2+ (also Co2+, Ca2+)"
  transport_direction: uptake
  regulation: "gating mechanism linked to intracellular Mg2+ concentration"
gating_mechanism:
  model: "close/open translocation cycle"
  trigger: "intracellular Mg2+ concentration"
  structural_basis: "conformational changes between pentameric (open) and dimeric (closed) intracellular domains"
