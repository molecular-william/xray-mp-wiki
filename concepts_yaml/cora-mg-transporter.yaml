details: >
  CorA is a Mg2+ transporter that forms a pentameric structure. It uses a common
  pore-loop mechanism for ion selectivity, with a GMN signature motif forming the
  selectivity filter. The transporter is regulated by intracellular Mg2+ levels
  through an allosteric mechanism involving ligand binding at interfacial sites
  between subunits. Gating is accomplished by rigid-body motions between symmetric
  (closed) and asymmetric (open) assemblies of the cytosolic domain subunits. The
  cytoplasmic pore contains Mg2+ binding sites including a N249/Q252 polar ring
  site and a Q242 site. Cobalt hexamine can compete with Mg2+ at the pore site,
  providing structural evidence for hexa-hydrated Mg2+ permeation. The full-length
  protein shows 10-fold higher Mg2+ affinity than the isolated cytoplasmic domain,
  reflecting stabilization by the membrane domain.
overview: >
  CorA is a Mg2+ transporter that forms a pentameric structure. It uses a common
  pore-loop mechanism for ion selectivity and transport. The transporter is regulated
  by intracellular Mg2+ levels through an allosteric mechanism.
