details: 'Intramembrane proteolysis is the cleavage of peptide bonds within the hydrophobic environment of a lipid bilayer. This process is carried out by intramembrane proteases such as rhomboid, S2P, and presenilin families. It plays key roles in signal transduction and protein quality control.'
