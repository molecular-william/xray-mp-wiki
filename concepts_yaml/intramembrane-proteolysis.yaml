    context: Archetypal rhomboid serine intramembrane protease; 7 TM helices, Ser-His catalytic dyad
  - protein: "[Rhomboid-1 (Drosophila)](/xray-mp-wiki/proteins/rhomboid-1/)"
    context: Drosophila rhomboid protease; cleaves transmembrane EGF-like proteins
