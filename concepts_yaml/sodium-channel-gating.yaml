verified: false

overview: >
  Voltage-gated sodium channels use a gating mechanism involving voltage-sensing domains
  and a selectivity filter. The channel opens in response to membrane depolarization,
  allowing sodium influx that propagates action potentials. The selectivity filter ensures
  sodium over other ions. The resting-state structure of NavAb reveals the complete
  voltage-dependent gating mechanism including the sliding helix mechanism of voltage
  sensing. Prokaryotic sodium channels also exhibit CTD-mediated inactivation gating
  distinct from eukaryotic inactivation mechanisms.

