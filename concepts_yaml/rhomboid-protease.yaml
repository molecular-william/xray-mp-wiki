overview: Rhomboid proteases are intramembrane serine proteases that cleave transmembrane
  domains of substrate proteins within the lipid bilayer. They play key roles in signal
  transduction, protein processing, and mitochondrial dynamics. The catalytic mechanism
  involves a serine-histidine dyad in the transmembrane region. Structural studies
  of the E. coli rhomboid [GLPG](/xray-mp-wiki/proteins/enzymes/glpg/) in complex
  with peptidyl-chloromethylketone inhibitors revealed the detailed architecture of
  the S1-S4 substrate-binding subsites and provided mechanistic insights into sequence-specific
  [Intramembrane Proteolysis](/xray-mp-wiki/concepts/membrane-mimetics/intramembrane-proteolysis/).
