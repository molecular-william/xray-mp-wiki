title: Rhomboid Protease Family
tags: [protease, membrane-protein, serine-protease, intramembrane-cleavage, tm-helices]
sources: [doi/10.1016##j.jmb.2007.10.014, doi/10.1016##j.jmb.2011.01.046]
overview: >
  The rhomboid family comprises intramembrane serine proteases found across all kingdoms
  of life. These enzymes cleave transmembrane substrates within the lipid bilayer plane.
  The rhomboid fold consists of seven transmembrane helices with an internal water-filled
  cavity containing a Ser-His catalytic dyad. A distinctive L1 loop lies laterally
  adjacent to the TM bundle, partially embedded in the membrane. A conserved WR motif
  at the tip of L1 is critical for optimal activity. The L5 cap regulates substrate
  access to the active site. Sequence identity among functional rhomboid proteases is
  extremely low, with only eight residues being invariant (six at the active site plus
  two glycines for helix packing).
