details: 'Aquaporins are water channel proteins that facilitate water transport across cell membranes. They form tetramers with each monomer containing a selective filter for water molecules. The NPA motifs and aromatic/arginine (ar/R) selectivity filter are key structural features. The NIP (Nodulin26-like Intrinsic Protein) subfamily of aquaporins, also termed metalloid porins, transports silicic acid, arsenous acid, and boric acid in addition to water. The aquaporin superfamily includes water-specific channels (AQP0-AQP2, AQP4-AQP6, AQP8) and aquaglyceroporins (AQP3, AQP7, AQP9) that also transport glycerol and urea. The high-resolution structure of AQP1 (PDB 1J4N) revealed the structural basis of water specificity, including the constriction region residues H182, R197, and F58, and four bound water molecules within the selectivity filter.'
