title: Aquaporin Family
tags: [water-channel, membrane-protein, ion-channel, tm-helices, homotetramer]
sources: [doi/10.1016##j.jmb.2007.02.070]
overview: >
  Aquaporins (AQPs) are integral membrane channel proteins that mediate bidirectional
  water and selected small amphipathic molecule transport across cellular membranes.
  The AQP fold consists of six transmembrane helices (M1-M8, with M1-M2 and M5-M6 as
  half-helices) forming a right-handed bundle with the pore running through the center.
  AQPs occur as homotetramers with four monomer channels. Two subfamilies exist:
  water-selective channels and aquaglyceroporins (promiscuous for water and small
  amphipathic molecules). The AQP fold is highly conserved, with two NPA (Asn-Pro-Ala)
  motifs at the ends of M3 and M7 defining the selectivity filter.
