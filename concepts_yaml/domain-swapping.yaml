details: Three-dimensional domain swapping occurs when a protein unfolds partially
  and exchanges a domain with another molecule, forming oligomers. This mechanism
  can lead to functional oligomers or pathological aggregates. It has been observed
  in many proteins including enzymes and structural proteins.
