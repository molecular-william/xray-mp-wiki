theme: minima
title: X-ray Detergent Wiki
description: Wiki on reagents and procedures for X-ray crystallography of membrane proteins
author: molecular-william
baseurl: "/xray-mp-wiki"
url: "https://molecular-william.github.io"
permalink: pretty

collections:
  proteins:
    output: true
    permalink: /xray-mp-wiki/proteins/:name/
  reagents:
    output: true
    permalink: /xray-mp-wiki/reagents/:name/
  methods:
    output: true
    permalink: /xray-mp-wiki/methods/:name/
  concepts:
    output: true
    permalink: /xray-mp-wiki/concepts/:name/
  categories:
    output: true
    permalink: /xray-mp-wiki/categories/:name/

defaults:
  - scope:
      path: ""
      type: "proteins"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "reagents"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "methods"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "concepts"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "categories"
    values:
      layout: "default"
