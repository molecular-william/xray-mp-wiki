theme: minima
title: X-ray Detergent Wiki
description: Wiki on reagents and procedures for X-ray crystallography of membrane proteins
author: molecular-william
baseurl: "/xray-mp-wiki"
url: "https://molecular-william.github.io"
permalink: pretty

collections:
  proteins:
    output: true
    permalink: /proteins/:name.html
  reagents:
    output: true
    permalink: /reagents/:name.html
  methods:
    output: true
    permalink: /methods/:name.html
  concepts:
    output: true
    permalink: /concepts/:name.html
  categories:
    output: true
    permalink: /categories/:name.html

defaults:
  - scope:
      path: ""
      type: "proteins"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "reagents"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "methods"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "concepts"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "categories"
    values:
      layout: "default"
